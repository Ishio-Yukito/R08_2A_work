<!DOCTYPE html>
<html lang="jp">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リストについて</title>
</head>
<body>
    <h1>リスト</h1>

    <h2>行番号付きリスト</h2>

    <ol>
        <li>一番</li>
        <li>二番</li>
        <li>三番</li>
    </ol>

    <ol start="11">
        <li>11番からスタート</li>
        <li>aaa</li>
        <li>bbb</li>
        <ol>
             <li>三の一番</li>
        </ol>

    </ol>

    <h2>行頭記号付きリスト</h2>

    <ul>
        <li>一番</li>
        <li>2bann</li>
        <li>3番</li>
       <ul>
            <li>三の一番</li>
       </ul> 
    </ul>

    <h2>定義・説明リスト</h2>

    <dl>
        <!--↓タイトル-->
        <dt>像</dt>
        <!--↓説明-->
        <dd>鼻が長い</dd> 
    </dl>
</body>
</html>
